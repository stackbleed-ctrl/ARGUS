name: Argus Security Scan

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 2 * * 1'  # Weekly Monday 2am

permissions:
  contents: read
  security-events: write  # Required for SARIF upload

jobs:
  argus-scan:
    name: Argus Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Argus
        run: pip install argus-scanner

      - name: Run Argus scan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          argus scan . \
            --output argus-report.json \
            --sarif argus-results.sarif \
            --severity MEDIUM \
            --concurrency 8
        continue-on-error: true  # Don't fail build, let SARIF handle alerts

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: argus-results.sarif
          category: argus

      - name: Upload JSON report as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: argus-security-report
          path: argus-report.json
          retention-days: 90

      - name: Comment on PR with summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('argus-report.json', 'utf8'));
            const s = report.summary;
            const body = [
              '## 🔍 Argus Security Scan Results',
              '',
              `| Severity | Count |`,
              `|----------|-------|`,
              `| 🔴 Critical | ${s.critical} |`,
              `| 🟠 High | ${s.high} |`,
              `| 🟡 Medium | ${s.medium} |`,
              `| 🔵 Low | ${s.low} |`,
              '',
              `Scanned ${s.files_scanned} files (${s.lines_scanned.toLocaleString()} lines) in ${s.duration_seconds}s`,
              '',
              s.critical > 0 ? '⚠️ **Critical vulnerabilities found — review before merging.**' : '✅ No critical issues found.',
            ].join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
